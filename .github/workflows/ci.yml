name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default-deny — each job opts in to only what it needs.
permissions: {}

# Cancel in-flight runs when a new commit lands on the same branch / PR.
# Saves CI minutes and gives faster feedback on rapid push sequences.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # PR decoration via SonarCloud needs to read PR metadata; the scan-action
      # uses GITHUB_TOKEN under the hood for that.
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Sonar needs full git history for blame / change-window analysis.
          # Shallow clone (the default) makes Sonar warn and disables some checks.
          fetch-depth: 0
          # Don't persist GITHUB_TOKEN in .git/config — defense-in-depth.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@darkhunt-security'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Verify lockfile integrity
        # Catches accidental package.json/lockfile drift, AND any malicious dep
        # that mutates the lockfile during install.
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json was modified during install"
            exit 1
          }

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - name: Tests with coverage
        run: npm run test:coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          # GITHUB_TOKEN is needed for PR decoration (annotates PRs with issues).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SONAR_TOKEN is the only Sonar secret this workflow needs — generate
          # one at https://sonarcloud.io/account/security and add it as a repo
          # secret. Project key + org are committed in sonar-project.properties
          # (they're public info).
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  publish:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@darkhunt-security'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Verify lockfile integrity
        # Must run BEFORE the `npm version` step below — that step
        # legitimately mutates package-lock.json, so the integrity check
        # has to happen against the unmutated post-install state.
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json was modified during install"
            exit 1
          }

      - name: Compute build version
        id: version
        run: |
          BASE_VERSION=$(jq -r .version package.json)
          BASE_VERSION="${BASE_VERSION%%-*}"
          echo "version=${BASE_VERSION}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish build version
        run: |
          echo "::notice title=Build Version::${{ steps.version.outputs.version }}"
          echo "VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_RELEASES }}
          webhook-type: incoming-webhook
          payload: |
            text: "*${{ github.event.repository.name }}* released `${{ steps.version.outputs.version }}`\n
            • Commit: <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>\n
            • Published by: ${{ github.actor }}"
