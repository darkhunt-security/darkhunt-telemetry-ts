name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar needs full git history for blame / change-window analysis.
          # Shallow clone (the default) makes Sonar warn and disables some checks.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@darkhunt-security'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - name: Tests with coverage
        run: npm run test:coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          # GITHUB_TOKEN is needed for PR decoration (annotates PRs with issues)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SONAR_TOKEN must be added to repo Secrets — generate at
          # https://sonarcloud.io/account/security under "Tokens"
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Project + org keys come from org-level secrets (same convention as
          # workflow-manager). Avoids hardcoding values that vary per environment.
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PREFIX_ORGANIZATION }}_${{ github.event.repository.name }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io

  publish:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@darkhunt-security'

      - name: Compute build version
        id: version
        run: |
          BASE_VERSION=$(jq -r .version package.json)
          BASE_VERSION="${BASE_VERSION%%-*}"
          echo "version=${BASE_VERSION}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish build version
        run: |
          echo "::notice title=Build Version::${{ steps.version.outputs.version }}"
          echo "VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C09925W0X8Q"
            text: "*${{ github.event.repository.name }}* released `${{ steps.version.outputs.version }}`\n
            • Commit: <${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>\n
            • Published by: ${{ github.actor }}"
