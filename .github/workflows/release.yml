name: Release

# Triggers when a GitHub Release is published. Use `gh release create vX.Y.Z`
# (or the GitHub UI) to fire this — pushing a tag alone won't.
on:
  release:
    types: [published]

# Default-deny; each job opts into the minimum it needs.
permissions: {}

jobs:
  # Build once and reuse the tarball for both registries so the bytes are
  # identical across publishes (npm and GHPR see the same shasum).
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: npm

      - run: npm ci
      - run: npm run build

      # Sanity: refuse to publish a tag that doesn't match package.json#version.
      # Catches "tagged v0.6.0 but forgot to bump package.json" before it ships.
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Release tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      # `npm pack --silent` only suppresses npm's own logs — lifecycle scripts
      # (prepare → generate-rules-json.ts) still log their progress to stdout,
      # which would otherwise contaminate the captured tarball name. Take the
      # last line, which is always the produced .tgz filename.
      - id: pack
        run: |
          file=$(npm pack --silent | tail -n 1)
          echo "tarball=$file" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tarball
          path: '*.tgz'
          retention-days: 7

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance attestation.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No registry-url here on purpose. setup-node's registry-url writes
      # `_authToken=${NODE_AUTH_TOKEN}` into .npmrc, which would shadow the
      # OIDC fallback even when NODE_AUTH_TOKEN is unset. With no .npmrc
      # token entry, the npm CLI sees no token, then mints a short-lived
      # OIDC token from the workflow's id-token JWT and uses it to publish.
      # Requires Trusted Publisher to be configured for the package on
      # npmjs.com (Settings → Packages → Trusted Publishers).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tarball

      - name: Publish to public npm via Trusted Publishing (OIDC)
        run: npm publish *.tgz --provenance --access public

  publish-ghpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHPR write requires this permission on GITHUB_TOKEN.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          registry-url: https://npm.pkg.github.com
          scope: '@darkhunt-security'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tarball

      # GHPR ignores `publishConfig.registry` from the tarball when the env
      # `--registry` flag is set, so dual-publishing the same tarball works
      # even though the file's publishConfig points at the public registry.
      - name: Publish to GitHub Package Registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish *.tgz --registry https://npm.pkg.github.com
