# SonarCloud project configuration
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
#
# Project + organization keys are public information (visible in the
# SonarCloud project URL) — fine to commit here. Only the SONAR_TOKEN
# (analysis credential) needs to be a CI secret.
sonar.projectKey=darkhunt-security_darkhunt-telemetry-ts
sonar.organization=darkhunt-security
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=test

# --- Test coverage ---
# Generated by `npm run test:coverage` (c8 → coverage/lcov.info).
# CI must run that script before invoking the Sonar scan, otherwise the
# Coverage card on the dashboard stays empty.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/masking/rules/**,src/**/*.d.ts

# --- Issue suppression: secret-scanner false positives on the masking YAML ---
#
# data-masking-rules.yaml's `examples:` array lists synthetic fixtures
# (zero-entropy strings whose only purpose is to demonstrate what each
# regex matches: GitHub PAT shapes, GitLab token shapes, Stripe API key
# shapes, etc.). Sonar's secret scanner can't tell "example matching a
# known secret format" from "real leaked secret", so it flags every
# example as a hard-coded credential. We suppress the entire `secrets`
# rule family for this one file. All other Sonar analysis (code smells,
# duplication, etc.) still runs on it.
sonar.issue.ignore.multicriteria=maskingExamples
sonar.issue.ignore.multicriteria.maskingExamples.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.maskingExamples.resourceKey=src/masking/rules/data-masking-rules.yaml
