# CodeRabbit configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US
early_access: false

# Project conventions CodeRabbit should respect on every review.
# Spelled out here so it doesn't repeatedly suggest changes that conflict
# with how the codebase is intentionally written.
tone_instructions: |
  Be concise and concrete. The project already runs Prettier, ESLint, and
  TypeScript strict mode — skip suggestions about formatting, naming
  conventions, or stylistic simplifications. Focus on:
  - Correctness bugs (off-by-one, wrong validator output, missed edge cases)
  - Security regressions (especially in the masking layer)
  - Test coverage gaps for new behavior
  - API consistency across Trace / Span / Generation / Sanitizer
  Don't generate poems, ASCII art, or excessive summaries.

chat:
  auto_reply: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Skip review on generated, vendored, or non-code paths.
  path_filters:
    - '!dist/**'
    - '!coverage/**'
    - '!node_modules/**'
    - '!**/*.lock'
    - '!package-lock.json'
    # Generated by `npm run prepare`; gitignored anyway, defensive include.
    - '!src/masking/rules/rules.json'
    # The masking ruleset is a data file. Its `examples:` arrays are
    # synthetic strings matching real-secret formats by design — Sonar's
    # secret scanner already false-positives on them, no need for
    # CodeRabbit to do the same.
    - '!src/masking/rules/data-masking-rules.yaml'

  # Per-path instructions for areas where CodeRabbit's defaults need
  # nudging away from generic advice.
  path_instructions:
    - path: 'src/masking/validators/**/*.ts'
      instructions: |
        These are implementations of fixed, well-specified algorithms
        (Luhn, credit_card IIN range, ABA mod-10, IBAN mod-97,
        base58check, bech32 / BIP-173/350, EIP-55 keccak256). The shape
        is dictated by the spec, not authorial preference.

        DO flag: correctness bugs vs the documented algorithm; missed
        edge cases the spec calls out; off-by-one or sign errors.

        DO NOT suggest: refactoring for "readability"; alternative
        algorithms; replacing the manual char comparisons with
        higher-level helpers; "use a library instead" — these are
        deliberately dependency-light implementations.

    - path: 'src/masking/sanitizer.ts'
      instructions: |
        The `console.warn` for unknown validators is deliberate fail-closed
        behavior (drop the rule, log once). Don't suggest replacing it
        with throw, silent skip, or a structured logger. Same for the
        MIN_INPUT_LENGTH short-circuit — it's a measured perf optimization.

    - path: 'src/exporter.ts'
      instructions: |
        The exporter intentionally swallows `catch {}` blocks because its
        own retry loop handles network/timeout failures — don't suggest
        adding logging or re-throwing inside catches. `crypto.randomInt`
        for retry jitter was a deliberate Sonar-driven swap from
        Math.random; don't suggest reverting.

    - path: '.github/workflows/**'
      instructions: |
        Actions are pinned by SHA with a trailing `# vX.Y.Z` comment by
        convention (matches workflow-manager / Langfuse). Don't suggest
        unpinning to a tag. Default-deny `permissions: {}` at workflow
        root and per-job opt-in is also intentional.

    - path: 'README.md'
      instructions: |
        Don't suggest restructuring sections, adding emoji headers, or
        TOC bloat. Sections and ordering are intentional. Code blocks
        in examples are runnable as-is and verified against the actual
        public API — flag only if a runtime API has actually changed.

    - path: 'src/masking/rules/types.ts'
      instructions: |
        These types mirror the JSON Schema in the upstream api-contract
        repo. Don't suggest renaming fields or restructuring — drift
        between the SDK types and the upstream schema breaks the
        cross-language contract.

  tools:
    eslint:
      enabled: true
    prettier:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
